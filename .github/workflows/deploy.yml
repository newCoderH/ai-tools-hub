name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          port: 2222
          script: |
            export PATH="/root/.nvm/versions/node/v24.14.1/bin:$PATH"
            /root/.nvm/versions/node/v24.14.1/bin/pm2 stop ai-tools-hub || true

      # rsync 上传构建产物
      - name: Upload build artifacts
        run: |
          echo "${{ secrets.VPS_KEY }}" > ~/vps_key
          chmod 600 ~/vps_key
          rsync -avz --delete -e "ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -p 2222 -i ~/vps_key" .next/ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.VPS_PATH }}/.next/

      - name: Start PM2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          port: 2222
          script: |
            export PATH="/root/.nvm/versions/node/v24.14.1/bin:$PATH"
            cd ${{ secrets.VPS_PATH }}
            /root/.nvm/versions/node/v24.14.1/bin/pm2 restart ai-tools-hub || /root/.nvm/versions/node/v24.14.1/bin/pm2 start .next/standalone/server.js --name "ai-tools-hub"
            /root/.nvm/versions/node/v24.14.1/bin/pm2 save

      - name: Verify deployment
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          port: 2222
          script: |
            export PATH="/root/.nvm/versions/node/v24.14.1/bin:$PATH"
            /root/.nvm/versions/node/v24.14.1/bin/pm2 status
            curl -s http://localhost:3000 | head -c 100
